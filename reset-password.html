<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/assets/img/favicon.png">
<title>Reset Password — Virtual Rishta Naata</title>
<link rel="stylesheet" href="/assets/css/styles.css">
<style>
  body{
    min-height:100vh;display:flex;flex-direction:column;
    background:
      radial-gradient(ellipse 60% 45% at 15% 0%, rgba(197,157,82,.12), transparent),
      radial-gradient(ellipse 55% 40% at 90% 100%, rgba(216,137,111,.10), transparent),
      var(--beige);
  }
  .login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;}
  .login-card{width:100%;max-width:420px;background:#fff;border-radius:var(--radius-l);box-shadow:var(--shadow-3);padding:44px 38px;}
  @media (max-width:480px){.login-card{padding:34px 26px;}}
  .login-brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:30px;}
  .login-brand img{height:64px;width:auto;margin-bottom:14px;}
  .login-brand h1{font-size:1.4rem;}
  .login-brand p{margin-top:8px;color:var(--ink-soft);font-size:.88rem;}
  .back-home{position:absolute;top:28px;left:28px;font-size:.82rem;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:6px;}
  .back-home:hover{color:var(--green);}
</style>
</head>
<body>
<a href="/home.html" class="back-home">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Back to Home
</a>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <img src="/assets/img/logo-icon.png" alt="Virtual Rishta Naata logo">
      <h1>Choose a New Password</h1>
      <p id="introText">Verifying your reset link...</p>
    </div>

    <form id="resetForm" onsubmit="return false;" style="display:none;">
      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="At least 8 characters">
      </div>
      <div class="field">
        <label for="confirmPassword">Confirm New Password</label>
        <input type="password" id="confirmPassword" placeholder="Re-enter your new password">
      </div>
      <p id="resetError" style="display:none;color:#A85A3E;font-size:.85rem;margin-bottom:16px;"></p>
      <button type="button" id="resetBtn" class="btn btn-primary btn-block" onclick="handleSetPassword()">Set New Password</button>
    </form>

    <div id="invalidLinkPanel" style="display:none;text-align:center;">
      <p style="color:var(--ink-soft);font-size:.88rem;margin-bottom:18px;">This reset link is invalid or has expired.</p>
      <a href="/login.html" class="btn btn-outline btn-block">Back to Log In</a>
    </div>

    <div id="successPanel" style="display:none;text-align:center;">
      <p style="color:var(--green);font-size:.9rem;margin-bottom:18px;">Your password has been updated.</p>
      <a href="/login.html" class="btn btn-primary btn-block">Log In</a>
    </div>
  </div>
</div>

<script src="/assets/js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/assets/js/supabase-config.js"></script>
<script src="/assets/js/supabase-client.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
  let recoverySessionReady = false;

  sb.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoverySessionReady = true;
      document.getElementById('introText').textContent = 'Enter a new password for your account.';
      document.getElementById('resetForm').style.display = 'block';
    }
  });

  // If the link's token already resolved before this listener attached,
  // detectSessionInUrl (on by default) will have left us with a valid
  // session — treat that the same as a PASSWORD_RECOVERY event.
  setTimeout(async () => {
    if (recoverySessionReady) return;
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      recoverySessionReady = true;
      document.getElementById('introText').textContent = 'Enter a new password for your account.';
      document.getElementById('resetForm').style.display = 'block';
    } else {
      document.getElementById('introText').style.display = 'none';
      document.getElementById('invalidLinkPanel').style.display = 'block';
    }
  }, 1200);

  async function handleSetPassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const errorEl = document.getElementById('resetError');
    const btn = document.getElementById('resetBtn');
    errorEl.style.display = 'none';

    if (!newPassword || newPassword.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.';
      errorEl.style.display = 'block';
      return;
    }
    if (newPassword !== confirmPassword) {
      errorEl.textContent = 'Passwords do not match.';
      errorEl.style.display = 'block';
      return;
    }

    btn.setAttribute('disabled', '');
    btn.textContent = 'Updating...';
    try {
      await vrnUpdatePassword(newPassword);
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('successPanel').style.display = 'block';
    } catch (err) {
      errorEl.textContent = err.message || 'Something went wrong — please try again.';
      errorEl.style.display = 'block';
      btn.removeAttribute('disabled');
      btn.textContent = 'Set New Password';
    }
  }
</script>
</body>
</html>
