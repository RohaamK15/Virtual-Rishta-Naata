<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Profiles — Virtual Rishta Naata</title>
<link rel="stylesheet" href="/assets/css/styles.css">
<style>
  body{padding-bottom:88px;}
  .app-header{
    position:sticky;top:0;z-index:40;background:rgba(255,249,242,.92);backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(19,75,53,.08);padding:18px 0;
  }
  .app-header .wrap{display:flex;align-items:center;justify-content:space-between;}
  .app-header .brand-mini{display:flex;align-items:center;gap:10px;}
  .app-header .brand-mini img{height:38px;width:auto;}
  .app-header .brand-mini span{font-family:'Cinzel',serif;font-weight:600;color:var(--green);font-size:1rem;}
  .header-actions{display:flex;gap:10px;}
  .icon-btn{
    width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid rgba(19,75,53,.14);
    display:flex;align-items:center;justify-content:center;color:var(--green);cursor:pointer;box-shadow:var(--shadow-1);
    transition:all .25s var(--ease-out);
  }
  .icon-btn:hover{border-color:var(--green);transform:translateY(-1px);}

  .layout{display:grid;grid-template-columns:280px 1fr;gap:32px;padding:32px 0 60px;}
  @media (max-width:900px){.layout{grid-template-columns:1fr;}}
  .filters-desktop{display:block;}
  @media (max-width:900px){.filters-desktop{display:none;}}

  .filter-panel{background:#fff;border-radius:var(--radius-m);box-shadow:var(--shadow-1);padding:26px 24px;position:sticky;top:96px;}
  .filter-panel h3{font-size:1rem;margin-bottom:20px;}
  .filter-group{margin-bottom:24px;}
  .filter-group:last-child{margin-bottom:0;}
  .filter-group label{margin-bottom:10px;}
  .range-row{display:flex;align-items:center;gap:8px;}
  .range-row input{width:100%;}

  .results-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .results-count{font-family:'Montserrat',sans-serif;font-size:.82rem;color:var(--ink-soft);}
  .mobile-filter-btn{display:none;align-items:center;gap:8px;}
  @media (max-width:900px){.mobile-filter-btn{display:inline-flex;}}

  .profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  @media (max-width:1080px){.profile-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:640px){.profile-grid{grid-template-columns:1fr;}}

  .profile-card{
    background:#fff;border-radius:var(--radius-m);box-shadow:var(--shadow-1);padding:24px 22px;cursor:pointer;
    transition:transform .35s var(--ease-spring), box-shadow .35s var(--ease-out);
  }
  .profile-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-2);}
  .profile-card:focus-visible{outline:2px solid var(--gold);outline-offset:3px;}
  .pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .pc-ref{font-family:'Cinzel',serif;color:var(--green);font-size:1.05rem;letter-spacing:.02em;}
  .pc-body{display:flex;gap:22px;}
  .pc-stat{display:flex;flex-direction:column;}
  .pc-stat strong{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--green);}
  .pc-stat span{font-size:.68rem;color:var(--ink-soft);letter-spacing:.04em;text-transform:uppercase;}
  .pc-cta{
    margin-top:18px;display:flex;align-items:center;justify-content:space-between;
    font-family:'Montserrat',sans-serif;font-weight:600;font-size:.78rem;color:var(--gold);
  }

  .empty-state{text-align:center;padding:80px 20px;color:var(--ink-soft);}
  .empty-state svg{color:var(--gold);margin-bottom:16px;}

  /* detail sheet */
  #detailSheet .sheet-inner{padding:36px 34px 40px;}
  @media (max-width:600px){#detailSheet .sheet-inner{padding:28px 22px 100px;}}
  .sheet-drag{width:44px;height:5px;background:rgba(19,75,53,.15);border-radius:99px;margin:0 auto 22px;display:none;}
  @media (max-width:759px){.sheet-drag{display:block;}}
  .sheet-close{
    position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:var(--beige);
    display:flex;align-items:center;justify-content:center;color:var(--green);cursor:pointer;border:none;
  }
  .detail-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:26px;}
  .detail-photo{
    width:96px;height:120px;border-radius:50% 50% 8px 8px / 34% 34% 8px 8px;overflow:hidden;flex-shrink:0;
    background:var(--green-soft);display:flex;align-items:center;justify-content:center;
  }
  .detail-photo img{width:100%;height:100%;object-fit:cover;}
  .detail-photo svg{color:var(--green);}
  .detail-info h2{font-size:1.5rem;}
  .detail-meta{margin-top:8px;color:var(--ink-soft);font-size:.9rem;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;margin:26px 0;}
  @media (max-width:520px){.detail-grid{grid-template-columns:1fr;}}
  .detail-field span{display:block;font-family:'Montserrat',sans-serif;font-size:.66rem;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
  .detail-field strong{font-size:.92rem;color:var(--ink);font-weight:400;}
  .detail-block{margin-top:22px;padding-top:22px;border-top:1px solid rgba(19,75,53,.08);}
  .detail-block h4{font-family:'Montserrat',sans-serif;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;color:var(--green);margin-bottom:10px;}
  .detail-block p{color:var(--ink-soft);font-size:.92rem;}
</style>
</head>
<body>
<header class="app-header">
  <div class="wrap">
    <a href="/home.html" class="brand-mini">
      <img src="/assets/img/logo-icon.png" alt="">
      <span>Browse Profiles</span>
    </a>
    <div class="header-actions">
      <button class="icon-btn mobile-filter-btn" onclick="openSheet('filterSheet')" aria-label="Open filters" style="display:flex;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
      </button>
      <a href="/account.html" class="icon-btn" aria-label="My account" style="text-decoration:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg>
      </a>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="layout">
    <aside class="filters-desktop">
      <div class="filter-panel" id="filterPanelDesktop"></div>
    </aside>

    <section>
      <div class="results-head">
        <span class="results-count" id="resultsCount">8 profiles found</span>
        <button class="btn btn-outline btn-sm mobile-filter-btn" onclick="openSheet('filterSheet')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
          Filters
        </button>
      </div>
      <div class="profile-grid" id="profileGrid"></div>
    </section>
  </div>
</main>

<!-- Mobile filter sheet -->
<div class="overlay" id="filterSheet-overlay" onclick="closeSheet('filterSheet')"></div>
<div class="sheet" id="filterSheet" style="z-index:95;">
  <div class="sheet-inner" style="padding:28px 24px 32px;">
    <div class="sheet-drag"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
      <h3>Filters</h3>
      <button class="sheet-close" style="position:static;" onclick="closeSheet('filterSheet')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div id="filterPanelMobile"></div>
    <button class="btn btn-primary btn-block" style="margin-top:20px;" onclick="closeSheet('filterSheet')">Show Results</button>
  </div>
</div>

<!-- Profile detail sheet -->
<div class="overlay" id="detailSheet-overlay" onclick="closeSheet('detailSheet')"></div>
<div class="sheet" id="detailSheet">
  <div class="sheet-inner" id="detailContent" style="position:relative;"></div>
</div>

<!-- App bottom nav -->
<nav class="app-bottom-nav">
  <a href="/home.html" class="app-tab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 11.5L12 4l9 7.5"/><path d="M5 10v10h14V10"/></svg>
    Home
  </a>
  <a href="/search.html" class="app-tab active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    Search
  </a>
  <a href="/signup.html" class="app-tab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
    Create
  </a>
  <a href="/account.html" class="app-tab">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg>
    Account
  </a>
</nav>

<script src="/assets/js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="/assets/js/supabase-config.js"></script>
<script src="/assets/js/supabase-client.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
  vrnRequireAuth();
</script>
<script>
  function filterFieldsHTML(prefix){
    return `
      <div class="filter-group">
        <label>Gender</label>
        <div class="radio-pill-group">
          <label class="radio-pill"><input type="radio" name="${prefix}gender" value="" checked>All</label>
          <label class="radio-pill"><input type="radio" name="${prefix}gender" value="M">Male</label>
          <label class="radio-pill"><input type="radio" name="${prefix}gender" value="F">Female</label>
        </div>
      </div>
      <div class="filter-group">
        <label>Age Range</label>
        <div class="range-row">
          <input type="number" id="${prefix}ageMin" placeholder="Min" min="18" max="80">
          <span style="color:var(--ink-soft);">–</span>
          <input type="number" id="${prefix}ageMax" placeholder="Max" min="18" max="80">
        </div>
      </div>
      <div class="filter-group">
        <label>Country of Residence</label>
        <select id="${prefix}country">
          <option value="">Any country</option>
          <option>United Kingdom</option>
          <option>Pakistan</option>
          <option>Canada</option>
          <option>Australia</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Considers Matches From Pakistan</label>
        <div class="radio-pill-group">
          <label class="radio-pill"><input type="radio" name="${prefix}pak" value="" checked>Any</label>
          <label class="radio-pill"><input type="radio" name="${prefix}pak" value="Yes">Yes</label>
          <label class="radio-pill"><input type="radio" name="${prefix}pak" value="No">No</label>
        </div>
      </div>
    `;
  }

  document.getElementById('filterPanelDesktop').innerHTML = '<h3>Filters</h3>' + filterFieldsHTML('d_');
  document.getElementById('filterPanelMobile').innerHTML = filterFieldsHTML('m_');

  function currentFilters(){
    const g = document.querySelector('input[name="d_gender"]:checked')?.value || '';
    const min = document.getElementById('d_ageMin').value;
    const max = document.getElementById('d_ageMax').value;
    const country = document.getElementById('d_country').value;
    const pak = document.querySelector('input[name="d_pak"]:checked')?.value || '';
    return {g, min, max, country, pak};
  }

  function syncMobileToDesktop(){
    // keep mobile + desktop filters in sync (mobile drives, applied on close)
    const g = document.querySelector('input[name="m_gender"]:checked')?.value || '';
    document.querySelector(`input[name="d_gender"][value="${g}"]`).checked = true;
    document.getElementById('d_ageMin').value = document.getElementById('m_ageMin').value;
    document.getElementById('d_ageMax').value = document.getElementById('m_ageMax').value;
    document.getElementById('d_country').value = document.getElementById('m_country').value;
    const pak = document.querySelector('input[name="m_pak"]:checked')?.value || '';
    document.querySelector(`input[name="d_pak"][value="${pak}"]`).checked = true;
  }

  async function renderGrid(){
    syncMobileToDesktop();
    const {g, min, max, country, pak} = currentFilters();
    const grid = document.getElementById('profileGrid');
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><p>Loading profiles…</p></div>`;

    let results = [];
    try {
      results = await vrnSearchProfiles({ gender: g, minAge: min, maxAge: max, country, considerPakistan: pak });
    } catch (err) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>Couldn't load profiles</h3><p style="margin-top:8px;">${err.message || 'Please try again.'}</p></div>`;
      document.getElementById('resultsCount').textContent = '';
      return;
    }

    document.getElementById('resultsCount').textContent = `${results.length} profile${results.length!==1?'s':''} found`;
    grid.innerHTML = results.map(p => `
      <div class="profile-card" tabindex="0" role="button" onclick="openProfile('${p.ref_code}')" onkeydown="if(event.key==='Enter')openProfile('${p.ref_code}')">
        <div class="pc-top">
          <span class="pc-ref">${p.ref_code}</span>
          <span class="badge ${p.gender==='M'?'badge-m':'badge-f'}">${p.gender==='M'?'Male':'Female'}</span>
        </div>
        <div class="pc-body">
          <div class="pc-stat"><strong>${p.age}</strong><span>Years</span></div>
          <div class="pc-stat"><strong>${p.country}</strong><span>Country</span></div>
        </div>
        <div class="pc-cta">View Full Profile <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      </div>
    `).join('') || `<div class="empty-state" style="grid-column:1/-1;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <h3>No profiles match your filters</h3>
        <p style="margin-top:8px;">Try widening your age range or removing a filter.</p>
      </div>`;
  }

  async function openProfile(refCode){
    const detailEl = document.getElementById('detailContent');
    detailEl.innerHTML = `<div class="sheet-drag"></div><p style="padding:20px;">Loading profile…</p>`;
    openSheet('detailSheet');

    let p;
    try {
      p = await vrnGetProfileByRef(refCode);
    } catch (err) {
      detailEl.innerHTML = `<div class="sheet-drag"></div><p style="padding:20px;color:#A85A3E;">Couldn't load this profile (${err.message || 'unknown error'}).</p>`;
      return;
    }

    let photoUrl = null;
    if (p.gender === 'M' && p.has_photo) {
      try {
        const { data } = await sb.functions.invoke('get-profile-photo', { body: { ref_code: refCode } });
        photoUrl = data?.url || null;
      } catch (e) { /* photo function not deployed yet — fall back to placeholder icon */ }
    }

    detailEl.innerHTML = `
      <div class="sheet-drag"></div>
      <button class="sheet-close" onclick="closeSheet('detailSheet')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="detail-head">
        <div class="detail-photo">
          ${photoUrl ? `<img src="${photoUrl}" alt="Profile photo">` : `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 016-6h4a6 6 0 016 6v1"/></svg>`}
        </div>
        <div class="detail-info">
          <span class="badge ${p.gender==='M'?'badge-m':'badge-f'}">${p.gender==='M'?'Male':'Female'}</span>
          <h2 style="margin-top:8px;">${p.ref_code}</h2>
          <p class="detail-meta">${p.age} years old · ${p.city}, ${p.county}, ${p.country}</p>
        </div>
      </div>

      <div class="detail-grid">
        <div class="detail-field"><span>Height</span><strong>${p.height || '—'}</strong></div>
        <div class="detail-field"><span>Qualifications</span><strong>${p.qualifications || '—'}</strong></div>
        <div class="detail-field"><span>Employment</span><strong>${p.employment || '—'}</strong></div>
        <div class="detail-field"><span>Residential Status</span><strong>${p.residential_status || '—'}</strong></div>
        <div class="detail-field"><span>Looking In</span><strong>${p.country_looking_in || '—'}</strong></div>
        <div class="detail-field"><span>Considers Pakistan</span><strong>${p.consider_pakistan ? 'Yes' : 'No'}</strong></div>
        <div class="detail-field"><span>Ahmadi Muslim</span><strong>${p.is_ahmadi ? 'Yes' : 'No'}</strong></div>
        <div class="detail-field"><span>Local Jamaat</span><strong>${p.local_jamaat || '—'}</strong></div>
        <div class="detail-field"><span>Previously Engaged / Married</span><strong>${p.had_previous ? `Yes — ${p.previous_type || 'Not specified'}, ${p.previous_duration || 'duration not given'}` : 'No'}</strong></div>
        <div class="detail-field"><span>Children</span><strong>${p.has_children ? 'Yes' : 'No'}</strong></div>
      </div>

      <div class="detail-block">
        <h4>Their Preference</h4>
        <p>${p.preference_line || '—'}</p>
      </div>
      ${p.additional_note ? `<div class="detail-block"><h4>Additional Note</h4><p>${p.additional_note}</p></div>` : ''}
      <div class="detail-block">
        <h4>About ${p.ref_code}</h4>
        <p>${p.about || '—'}</p>
      </div>

      <a href="mailto:${p.contact_email}?subject=Rishta Naata - Interest in your profile" class="btn btn-primary btn-block" style="margin-top:28px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        Contact via Email
      </a>
    `;
  }

  ['d_ageMin','d_ageMax','d_country'].forEach(id => document.getElementById(id).addEventListener('input', renderGrid));
  ['m_ageMin','m_ageMax','m_country'].forEach(id => document.getElementById(id).addEventListener('input', renderGrid));
  document.querySelectorAll('input[name="d_gender"],input[name="d_pak"],input[name="m_gender"],input[name="m_pak"]').forEach(el => el.addEventListener('change', renderGrid));

  renderGrid();
</script>
</body>
</html>
